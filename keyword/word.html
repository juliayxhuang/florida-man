<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Man Generator</title>
  <link rel="icon" href="../arrow-right.svg" type="image/svg+xml" sizes="any">
  <link rel="icon" href="../arrow-right.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="../arrow-right.svg">
  <link rel="stylesheet" href="wordstyle.css">  
</head>
<body>

  <div class="container">

    <!-- INPUT -->
    <div class="top-row">
      <input 
        type="text" 
        id="wordInput" 
        placeholder="Your word..." 
        maxlength="20"
      />
      <button type="button" id="aboutBtn" class="about-btn" aria-label="About">
        <img src="../arrow-left.svg" alt="">
      </button>
    </div>

    <!-- HEADLINE -->
    <div class="headline-section">
      <h1 id="headline">
      </h1>

      <p id="meta"></p>

      <a id="link" href="#" target="_blank"></a>
    </div>

  </div>

  <div id="aboutOverlay" class="about-overlay" aria-hidden="true">
    <button type="button" id="aboutCloseBtn" class="about-close" aria-label="Close">
      <img src="../x.svg" alt="">
    </button>
    <div class="about-content">
      <p>
        This website uses a JSON with over 10,000 “Florida man” articles to search for a headline that matches your key word.
      </p>
      <p>
        Press enter or return (on your phone) to search for your very own Florida man!
      </p>
    </div>
  </div>

  <script src="wordscript.js"></script>
</body>
</html>
